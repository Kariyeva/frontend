name: Lab 10 CI

on:
  push:
    branches: [main]

jobs:
  build-task2:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Lab_10/task2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build