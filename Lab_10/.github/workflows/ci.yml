name: Lab 10 Task2 CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-task2:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Lab_10/task2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Lab_10/task2/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build